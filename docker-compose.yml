services:
  ollama:
    image: ollama/ollama:latest
    container_name: gemma-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Décommente pour GPU NVIDIA :
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  web:
    image: node:20-alpine
    container_name: gemma-web
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PORT=3000
    command: sh -c "npm install && npm run web"
    depends_on:
      - ollama

volumes:
  ollama_data:
